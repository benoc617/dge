# Local development: PostgreSQL + Next.js dev server (hot reload via bind mount).
# Usage: docker compose up --build
# App: http://localhost:3000  ·  DB: localhost:5432 (postgres / postgres / srx)

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: srx
    # Host 5433 avoids clashing with a local Postgres on 5432; app uses service name `postgres` inside the network.
    ports:
      - "5433:5432"
    volumes:
      - srx_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d srx"]
      interval: 3s
      timeout: 5s
      retries: 10
      start_period: 5s

  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
      sbom: true
    ports:
      - "3000:3000"
    environment:
      # Overrides .env so the app reaches the compose network (not host localhost)
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/srx
      NODE_ENV: development
      # File watching inside Docker (especially macOS/Windows bind mounts)
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
    env_file:
      - path: .env
        required: false
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:'+(process.env.PORT||3000)).then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 45s
    volumes:
      - .:/app
      - srx_node_modules:/app/node_modules
      - srx_next:/app/.next

volumes:
  srx_pgdata:
  srx_node_modules:
  srx_next:
