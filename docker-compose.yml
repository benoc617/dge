# Local development: MySQL + Redis + pre-built Next.js app (`next start`) + AI worker.
# Source is baked into the image at build time (no bind mount). Pick up code changes: `npm run deploy`.
# App: http://localhost:3000  ·  DB: localhost:3306 (srx / srx / srx)  ·  Redis: localhost:6379

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 6

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: srx
      MYSQL_USER: srx
      MYSQL_PASSWORD: srx
    ports:
      - "3306:3306"
    volumes:
      - srx_mysqldata:/var/lib/mysql
    healthcheck:
      # Connect as the app user (srx) so the healthcheck reflects actual Prisma readiness,
      # not just whether the daemon socket is open.
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "srx", "-psrx"]
      interval: 5s
      timeout: 5s
      retries: 24
      start_period: 45s

  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
      sbom: true
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # Overrides .env so the app reaches the compose network (not host localhost)
      DATABASE_URL: mysql://srx:srx@mysql:3306/srx
      REDIS_URL: redis://redis:6379
      # Dev-only default — override in production via .env or your secrets manager.
      ADMIN_SESSION_SECRET: "dev-docker-compose-admin-secret-32chars!!"
    env_file:
      - path: .env
        required: false
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:'+(process.env.PORT||3000)).then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 5s
      timeout: 5s
      retries: 24
      start_period: 90s

  ai-worker:
    build:
      context: .
      dockerfile: Dockerfile.dev
      sbom: true
    restart: unless-stopped
    environment:
      DATABASE_URL: mysql://srx:srx@mysql:3306/srx
      REDIS_URL: redis://redis:6379
      SRX_WORKER_SCRIPT: scripts/ai-worker.ts
      AI_WORKER_POLL_MS: "500"
      AI_WORKER_CONCURRENCY: "4"
      # Give the MCTS search room to grow without hitting Node's default ~1.4 GB heap limit.
      NODE_OPTIONS: "--max-old-space-size=4096"
      # Short Gemini/AI timeouts so E2E tests fall back to local heuristics quickly.
      GEMINI_TIMEOUT_MS: "3000"
      DOOR_AI_MOVE_TIMEOUT_MS: "3000"
    env_file:
      - path: .env
        required: false
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      app:
        condition: service_healthy

volumes:
  srx_mysqldata:
